[build]
  command = "npm run build"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── API redirects → individual Netlify functions ──────────────────────────────
[[redirects]]
  from = "/api/notion-all-projects"
  to   = "/.netlify/functions/notion-all-projects"
  status = 200

[[redirects]]
  from = "/api/notion-suffixes-for-project"
  to   = "/.netlify/functions/notion-suffixes"
  status = 200

[[redirects]]
  from = "/api/notion-drawings-for-project"
  to   = "/.netlify/functions/notion-drawings"
  status = 200

[[redirects]]
  from = "/api/notion-drawing-by-number"
  to   = "/.netlify/functions/notion-drawing-by-number"
  status = 200

[[redirects]]
  from = "/api/finishes-lookup"
  to   = "/.netlify/functions/finishes-lookup"
  status = 200

[[redirects]]
  from = "/api/export-pdf"
  to   = "/.netlify/functions/export-pdf"
  status = 200

[[redirects]]
  from = "/api/df-submissions"
  to   = "/.netlify/functions/df-submissions"
  status = 200

[build